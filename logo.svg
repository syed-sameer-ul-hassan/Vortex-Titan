<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0a0a0a" rx="15" ry="15"/>
  
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333399;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(50, 25)" filter="url(#glow)">
    <circle cx="75" cy="75" r="50" stroke="url(#purpleGrad)" stroke-width="8" fill="none" stroke-dasharray="240" stroke-dashoffset="60">
      <animateTransform attributeName="transform" type="rotate" from="0 75 75" to="360 75 75" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="75" r="35" stroke="#00d4ff" stroke-width="4" fill="none" opacity="0.8">
       <animateTransform attributeName="transform" type="rotate" from="360 75 75" to="0 75 75" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="75" r="15" fill="#ffffff" opacity="0.9" />
  </g>

  <text x="160" y="110" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="white" letter-spacing="5">
    VORTEX
  </text>
  
  <text x="440" y="110" font-family="'Arial', sans-serif" font-size="60" font-weight="bold" fill="url(#purpleGrad)" letter-spacing="2">
    TITAN
  </text>

  <text x="165" y="150" font-family="'Arial', sans-serif" font-size="16" fill="#aaaaaa" letter-spacing="3">
    ENTERPRISE JOINT OPERATIONS PLATFORM
  </text>
</svg>