<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vortexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00cc" />
      <stop offset="100%" style="stop-color:#333399" />
    </linearGradient>
    
    <filter id="cyberGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(200, 150)">
    <g>
      <path d="M-60,0 L0,-60 L60,0 L0,60 Z" fill="none" stroke="url(#vortexGrad)" stroke-width="1" opacity="0.4" />
      <path d="M-45,0 L0,-45 L45,0 L0,45 Z" fill="none" stroke="white" stroke-width="0.5" opacity="0.6" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </g>

    <circle r="30" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="10 5" filter="url(#cyberGlow)">
      <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <circle r="12" fill="white" filter="url(#cyberGlow)">
      <animate attributeName="r" values="10;13;10" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <line x1="-70" y1="0" x2="70" y2="0" stroke="url(#vortexGrad)" stroke-width="1" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="0,-80; 0,80; 0,-80" dur="4s" repeatCount="indefinite" />
    </line>
  </g>

  <g transform="translate(200, 320)" text-anchor="middle">
    <text font-family="Arial Black, sans-serif" font-size="42" fill="white" letter-spacing="4">
      VORTEX
    </text>
    <text y="50" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="url(#vortexGrad)" letter-spacing="10">
      TITAN
    </text>
    
    <rect x="-100" y="75" width="200" height="1" fill="white" opacity="0.2" />
    
    <text y="100" font-family="monospace" font-size="12" fill="#aaaaaa" letter-spacing="2">
      ENTERPRISE JOINT OPERATIONS
    </text>
    <text y="120" font-family="monospace" font-size="12" fill="#aaaaaa" letter-spacing="2">
      PLATFORM // v2.1
    </text>
  </g>
</svg>
